; Increase upload limits for brochure files (applies when PHP runs as CGI/FastCGI/FPM).
; Note: If you run the app using `php artisan serve` (CLI server), you must adjust your PHP `php.ini` instead.

upload_max_filesize = 2048M
post_max_size = 2048M
max_execution_time = 1200
max_input_time = 1200
memory_limit = 2048M

